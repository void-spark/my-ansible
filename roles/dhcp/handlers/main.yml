  - name: Restart DHCP server
    ansible.builtin.systemd_service:
      name: kea-dhcp4-server
      state: restarted

  - name: Restart DNS server
    ansible.builtin.systemd_service:
      name: unbound
      state: restarted

  - name: Restart Kea Control Agent
    ansible.builtin.systemd_service:
      name: kea-ctrl-agent
      state: restarted
