- name: Install core networking and DNS packages
  ansible.builtin.apt:
    name:
      - unbound
      - kea-dhcp4-server
      - kea-ctrl-agent
      - bind9-dnsutils
    state: present
    update_cache: true

- name: Disable unbound-resolvconf helper
  ansible.builtin.systemd_service:
    name: unbound-resolvconf
    state: stopped
    enabled: false

- name: Force local system to resolve DNS queries through Unbound
  ansible.builtin.copy:
    src: resolv.conf
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'

- name: Configure static IP
  ansible.builtin.copy:
    src: 10-static.network
    dest: /etc/systemd/network/10-static.network
    owner: root
    group: root
    mode: '0644'
  notify: Restart systemd-networkd

- name: Ensure systemd-networkd and wait-online are enabled and running
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - systemd-networkd.service
    - systemd-networkd-wait-online.service

- name: Create systemd override directories for Kea
  ansible.builtin.file:
    path: /etc/systemd/system/kea-dhcp4-server.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure DHCP server (Kea)
  ansible.builtin.copy:
    src: kea-dhcp4.conf
    dest: /etc/kea/kea-dhcp4.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart DHCP server

- name: Configure Kea Control Agent
  ansible.builtin.copy:
    src: kea-ctrl-agent.conf
    dest: /etc/kea/kea-ctrl-agent.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Kea Control Agent

- name: Configure DNS server (Unbound)
  ansible.builtin.copy:
    src: unbound.conf
    dest: /etc/unbound/unbound.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart DNS server

- name: Configure Kea to wait for network-online target
  ansible.builtin.copy:
    dest: /etc/systemd/system/kea-dhcp4-server.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Requires=systemd-networkd-wait-online.service
      After=systemd-networkd-wait-online.service
  notify: 
    - Reload systemd daemon
    - Restart DHCP server

- name: Ensure network services are enabled and running
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - kea-dhcp4-server
    - kea-ctrl-agent
    - unbound
