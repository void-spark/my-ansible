- name: Install core networking and DNS packages
  ansible.builtin.apt:
    name:
      - resolvconf
      - unbound
      - isc-dhcp-server
      - bind9-dnsutils
    state: present
    update_cache: true

- name: Copy static IP configuration template
  ansible.builtin.template:
    src: static.j2
    dest: /etc/network/interfaces.d/static
    owner: root
    group: root
    mode: '0644'

- name: Disable unbound-resolvconf helper
  ansible.builtin.systemd_service:
    name: unbound-resolvconf
    state: stopped
    enabled: false

- name: Configure DHCP server
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - { src: 'dhcp/dhcpd.conf.j2', dest: '/etc/dhcp/dhcpd.conf' }
    - { src: 'default/isc-dhcp-server.j2', dest: '/etc/default/isc-dhcp-server' }
  notify: Restart DHCP server

- name: Configure DNS server (Unbound)
  ansible.builtin.copy:
    src: unbound.conf
    dest: /etc/unbound/unbound.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart DNS server

