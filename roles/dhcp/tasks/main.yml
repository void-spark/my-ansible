- name: Install core networking and DNS packages
  ansible.builtin.apt:
    name:
      - resolvconf
      - unbound
      - kea-dhcp4-server
      - kea-ctrl-agent
      - bind9-dnsutils
    state: present
    update_cache: true

- name: Copy static IP configuration template
  ansible.builtin.template:
    src: static.j2
    dest: /etc/network/interfaces.d/static
    owner: root
    group: root
    mode: '0644'

- name: Disable unbound-resolvconf helper
  ansible.builtin.systemd_service:
    name: unbound-resolvconf
    state: stopped
    enabled: false

- name: Configure DHCP server (Kea)
  ansible.builtin.copy:
    src: kea-dhcp4.conf
    dest: /etc/kea/kea-dhcp4.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart DHCP server

- name: Configure Kea Control Agent
  ansible.builtin.copy:
    src: kea-ctrl-agent.conf
    dest: /etc/kea/kea-ctrl-agent.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Kea Control Agent

- name: Configure DNS server (Unbound)
  ansible.builtin.copy:
    src: unbound.conf
    dest: /etc/unbound/unbound.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart DNS server

