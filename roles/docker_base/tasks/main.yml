# Install docker/docker compose, and create some useful folders
- name: Install Docker and Compose
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - python3-docker
    state: present
    update_cache: true

- name: Create Docker directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "/var/docker/data"
    - "/var/docker/compose"
    - "/var/docker/backups"
